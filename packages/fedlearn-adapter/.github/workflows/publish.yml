# Publish @viyrockan/fedlearn-adapter (template).
# GitHub only runs workflows from the repository root `.github/workflows/`.
# Copy or symlink this file there, or merge jobs into your root workflow.

name: Publish @viyrockan/fedlearn-adapter

on:
  push:
    tags:
      - "fedlearn-adapter-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/fedlearn-adapter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/fedlearn-adapter/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('packages/fedlearn-adapter/Cargo.lock') }}

      - run: npm ci

      - name: Build native module
        run: npx napi build --platform --release --target ${{ matrix.target }} && npm run rename-native

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/fedlearn-adapter/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/fedlearn-adapter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy platform .node files into package
        run: find artifacts -name "*.node" -exec cp -v {} . \;

      - name: TypeScript build
        run: npx tsc

      - name: napi prepublish (optional platform packages)
        run: npx napi prepublish -t npm --skip-gh-release || true

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
