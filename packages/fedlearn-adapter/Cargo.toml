[package]
name = "fedlearn-adapter"
version = "0.1.0"
edition = "2021"
description = "napi-rs bindings for FedLearn LoRA adapter"

[lib]
crate-type = ["cdylib"]
path = "native/src/lib.rs"

[dependencies]
napi = { version = "2.16", features = ["napi6"] }
napi-derive = "2.16"
# 0.6.0 fails to build (conflicting rand via half); 0.10.x is a unified crates.io release pair
candle-core = "0.10.2"
candle-nn = "0.10.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
byteorder = "1"
thiserror = "1.0"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = 3

# This crate lives under the monorepo; declare a minimal workspace so Cargo does not
# treat it as a virtual member of the repo-root workspace (root Cargo.toml unchanged).
[workspace]
members = ["."]
resolver = "2"
